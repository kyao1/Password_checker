<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker — Konan Achille Yao</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #13161e;
    --border:   #1e2330;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --weak:     #ef4444;
    --fair:     #f59e0b;
    --good:     #3b82f6;
    --strong:   #22c55e;
    --vs:       #a855f7;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    animation: fadeUp .5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* terminal title bar */
  .titlebar {
    background: #1a1d27;
    border-bottom: 1px solid var(--border);
    padding: .6rem 1rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #febc2e; }
  .dot.g { background: #28c840; }
  .titlebar span {
    margin-left: auto;
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .1em;
  }

  .body { padding: 1.8rem; }

  h1 {
    font-family: var(--sans);
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: .05em;
    margin-bottom: .25rem;
  }
  .subtitle {
    font-size: .72rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    letter-spacing: .05em;
  }

  /* input */
  .input-wrap {
    position: relative;
    margin-bottom: 1.2rem;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    background: #0d0f14;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .95rem;
    padding: .75rem 3rem .75rem 1rem;
    outline: none;
    transition: border-color .2s;
    letter-spacing: .08em;
  }
  input:focus { border-color: #3b82f6; }
  .toggle-btn {
    position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: .85rem; padding: .2rem;
  }
  .toggle-btn:hover { color: var(--text); }

  /* strength bar */
  .bar-wrap { margin-bottom: 1.2rem; }
  .bar-label {
    display: flex; justify-content: space-between;
    font-size: .72rem; color: var(--muted);
    margin-bottom: .4rem; letter-spacing: .08em;
  }
  .bar-track {
    height: 6px; background: #1e2330; border-radius: 99px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 99px;
    transition: width .4s cubic-bezier(.4,0,.2,1), background .4s;
    width: 0%;
  }

  /* strength badge */
  .badge {
    display: inline-block;
    font-size: .7rem; font-weight: 700;
    letter-spacing: .12em;
    padding: .2rem .6rem;
    border-radius: 4px;
    transition: all .3s;
  }

  /* checks list */
  .checks { list-style: none; display: flex; flex-direction: column; gap: .4rem; }
  .check-item {
    display: flex; align-items: center; gap: .6rem;
    font-size: .78rem; color: var(--muted);
    transition: color .2s;
    padding: .3rem 0;
    border-bottom: 1px solid #1a1d27;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item.pass { color: var(--text); }
  .icon {
    width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .6rem; flex-shrink: 0;
    background: var(--border);
    transition: background .2s;
  }
  .check-item.pass .icon { background: var(--strong); color: #000; }
  .check-item.fail .icon { background: #1e2330; color: var(--muted); }

  .pts {
    margin-left: auto;
    font-size: .65rem;
    color: var(--muted);
    letter-spacing: .05em;
  }
  .check-item.pass .pts { color: var(--strong); }

  /* verdict */
  .verdict {
    margin-top: 1.2rem;
    padding: .8rem 1rem;
    border-radius: 8px;
    font-size: .78rem;
    background: #0d0f14;
    border: 1px solid var(--border);
    color: var(--muted);
    min-height: 42px;
    transition: all .3s;
    letter-spacing: .02em;
    line-height: 1.5;
  }

  /* footer */
  .footer {
    margin-top: 1.5rem;
    font-size: .65rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: .08em;
  }
  .footer a { color: #3b82f6; text-decoration: none; }
</style>
</head>
<body>

<div class="card">
  <div class="titlebar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <span>password_checker.py</span>
  </div>

  <div class="body">
    <h1>PASSWORD STRENGTH CHECKER</h1>
    <div class="subtitle">// security requirements validator — by Konan Achille Yao</div>

    <div class="input-wrap">
      <input type="password" id="pwInput" placeholder="Enter a password to analyze..." autocomplete="off" spellcheck="false">
      <button class="toggle-btn" id="toggleBtn" title="Show/hide password">👁</button>
    </div>

    <div class="bar-wrap">
      <div class="bar-label">
        <span>STRENGTH</span>
        <span id="scoreLabel">—</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </div>

    <ul class="checks" id="checkList"></ul>

    <div class="verdict" id="verdict">Start typing to analyze your password...</div>
  </div>
</div>

<div class="footer">
  github.com/konanyao &nbsp;·&nbsp; Python source: <a href="#">password_checker.py</a>
</div>

<script>
const COMMON = new Set(["password","123456","password1","12345678","qwerty","abc123",
  "letmein","monkey","1234567","dragon","111111","baseball","iloveyou","trustno1",
  "sunshine","master","welcome","shadow","superman","michael","password123","admin",
  "root","passw0rd","hello"]);

const CHECKS = [
  { label: "At least 8 characters",                    pts: 1, test: p => p.length >= 8 },
  { label: "At least 12 characters (recommended)",     pts: 1, test: p => p.length >= 12 },
  { label: "Contains uppercase letter (A-Z)",          pts: 1, test: p => /[A-Z]/.test(p) },
  { label: "Contains lowercase letter (a-z)",          pts: 1, test: p => /[a-z]/.test(p) },
  { label: "Contains a number (0-9)",                  pts: 1, test: p => /\d/.test(p) },
  { label: "Contains special character (!@#$%...)",    pts: 2, test: p => /[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>\/?`~]/.test(p) },
  { label: "No spaces",                                pts: 1, test: p => !p.includes(" ") },
  { label: "No repeated chars 3+ times (e.g. 'aaa')", pts: 1, test: p => !/(.)\\1{2,}/.test(p) },
  { label: "Not a common/known weak password",         pts: 2, test: p => !COMMON.has(p.toLowerCase()) },
];

const MAX = CHECKS.reduce((s,c) => s + c.pts, 0);

const RATINGS = [
  { min: 0.00, label: "WEAK",        color: "#ef4444", advice: "This would be cracked almost instantly. Keep going." },
  { min: 0.35, label: "FAIR",        color: "#f59e0b", advice: "Better, but still vulnerable. Add more variety." },
  { min: 0.60, label: "GOOD",        color: "#3b82f6", advice: "Decent password. A couple more tweaks and you're there." },
  { min: 0.80, label: "STRONG",      color: "#22c55e", advice: "Strong password. Only minor improvements possible." },
  { min: 0.95, label: "VERY STRONG", color: "#a855f7", advice: "Excellent. This meets all security requirements." },
];

function getRating(score) {
  let r = RATINGS[0];
  for (const x of RATINGS) if (score / MAX >= x.min) r = x;
  return r;
}

// Build check items
const list = document.getElementById("checkList");
CHECKS.forEach((c, i) => {
  const li = document.createElement("li");
  li.className = "check-item fail";
  li.id = "chk" + i;
  li.innerHTML = `<div class="icon" id="icon${i}">✗</div><span>${c.label}</span><span class="pts" id="pts${i}"></span>`;
  list.appendChild(li);
});

const input   = document.getElementById("pwInput");
const barFill = document.getElementById("barFill");
const scoreLbl= document.getElementById("scoreLabel");
const verdict = document.getElementById("verdict");
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.addEventListener("click", () => {
  input.type = input.type === "password" ? "text" : "password";
});

input.addEventListener("input", () => {
  const pw = input.value;
  if (!pw) {
    barFill.style.width = "0%";
    scoreLbl.textContent = "—";
    verdict.textContent = "Start typing to analyze your password...";
    verdict.style.borderColor = "var(--border)";
    CHECKS.forEach((_, i) => {
      document.getElementById("chk"  + i).className = "check-item fail";
      document.getElementById("icon" + i).textContent = "✗";
      document.getElementById("pts"  + i).textContent = "";
    });
    return;
  }

  let score = 0;
  CHECKS.forEach((c, i) => {
    const pass = c.test(pw);
    if (pass) score += c.pts;
    const li   = document.getElementById("chk"  + i);
    const icon = document.getElementById("icon" + i);
    const pts  = document.getElementById("pts"  + i);
    li.className = "check-item " + (pass ? "pass" : "fail");
    icon.textContent = pass ? "✓" : "✗";
    pts.textContent  = pass ? `+${c.pts}pt` : "";
  });

  const pct    = score / MAX;
  const rating = getRating(score);

  barFill.style.width      = (pct * 100) + "%";
  barFill.style.background = rating.color;
  scoreLbl.textContent     = `${score}/${MAX} — ${rating.label}`;
  scoreLbl.style.color     = rating.color;

  verdict.textContent      = rating.advice;
  verdict.style.borderColor= rating.color + "55";
  verdict.style.color      = rating.color;
});
</script>
</body>
</html>
